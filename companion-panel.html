<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mira Panel</title>
  <style>
    :root {
      --ink: #18201f;
      --muted: #68706d;
      --line: #dce5df;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }

    button {
      border: 0;
      font: inherit;
      cursor: default;
    }

    .panel {
      width: 100%;
      height: 100%;
      position: relative;
      color: #f3fffb;
    }

    .bubble {
      position: absolute;
      inset: 6px 0 6px 14px;
      padding: 14px 12px 14px 16px;
      border-radius: 16px;
      background: rgba(18, 29, 31, 0.9);
      box-shadow:
        0 18px 52px rgba(20, 31, 34, 0.24),
        0 0 0 1px rgba(128, 241, 213, 0.12);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .bubble > div:first-child {
      min-width: 0;
    }

    .bubble::before {
      content: "";
      position: absolute;
      left: -7px;
      top: 42px;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: inherit;
      transform: rotate(45deg);
      box-shadow: -1px 1px 0 rgba(128, 241, 213, 0.08);
    }

    .panel.side-left .bubble {
      inset: 6px 14px 6px 0;
    }

    .panel.side-left .bubble::before {
      right: -7px;
      left: auto;
      box-shadow: 1px -1px 0 rgba(128, 241, 213, 0.08);
    }

    .panel.theme-day .bubble {
      background: rgba(255, 255, 255, 0.94);
      box-shadow:
        0 18px 52px rgba(30, 44, 38, 0.15),
        0 0 0 1px rgba(24, 32, 31, 0.08);
      color: var(--ink);
    }

    .panel.theme-day .bubble::before {
      box-shadow: -1px 1px 0 rgba(24, 32, 31, 0.06);
    }

    .panel.theme-day.side-left .bubble::before {
      box-shadow: 1px -1px 0 rgba(24, 32, 31, 0.06);
    }

    strong {
      display: block;
      margin: 0 0 5px;
      font-size: 13px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    p {
      margin: 0;
      max-width: 100%;
      color: rgba(232, 248, 242, 0.72);
      font-size: 11px;
      line-height: 1.38;
      overflow-wrap: anywhere;
    }

    .theme-day p {
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(128, 241, 213, 0.14);
      color: #eefbf7;
      display: grid;
      place-items: center;
    }

    .theme-day .icon-btn {
      background: #f4f7f2;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <aside class="panel" id="panel">
    <div class="bubble">
      <div>
        <strong id="title">Mira 在这里</strong>
        <p id="message">我会轻轻看着节奏，先提醒，不打断。</p>
      </div>
      <div class="actions">
        <button class="icon-btn" id="openBtn" type="button" title="打开 EyeFlow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        </button>
        <button class="icon-btn" id="collapseBtn" type="button" title="收起 Mira">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <script>
    const panel = document.querySelector("#panel");
    const title = document.querySelector("#title");
    const message = document.querySelector("#message");

    function getTheme() {
      const hour = new Date().getHours();
      return hour >= 7 && hour < 19 ? "day" : "night";
    }

    function refreshTheme() {
      const theme = getTheme();
      panel.classList.toggle("theme-day", theme === "day");
      panel.classList.toggle("theme-night", theme === "night");
    }

    refreshTheme();
    window.setInterval(refreshTheme, 60 * 1000);

    function setPanelHovering(hovering) {
      window.eyeflowDesktop?.setCompanionHover?.("panel", hovering);
    }

    if (window.eyeflowDesktop?.onState) {
      window.eyeflowDesktop.onState((state) => {
        title.textContent = state.title || "Mira 在这里";
        message.textContent = state.message || "我会轻轻看着节奏，先提醒，不打断。";
      });
    }

    if (window.eyeflowDesktop?.onPanelSide) {
      window.eyeflowDesktop.onPanelSide((side) => {
        panel.classList.toggle("side-left", side === "left");
        panel.classList.toggle("side-right", side !== "left");
      });
    }

    document.querySelector("#openBtn").addEventListener("click", () => {
      window.eyeflowDesktop?.showDashboard();
    });

    document.querySelector("#collapseBtn").addEventListener("click", () => {
      setPanelHovering(false);
      window.eyeflowDesktop?.setCompanionExpanded(false);
    });

    panel.addEventListener("mouseenter", () => setPanelHovering(true));
    panel.addEventListener("mouseleave", () => setPanelHovering(false));
    window.addEventListener("blur", () => setPanelHovering(false));
  </script>
</body>
</html>
